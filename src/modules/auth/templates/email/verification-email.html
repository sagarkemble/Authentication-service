<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>Email Verification</title>

    <style>
      body {
        margin: 0;

        padding: 0;

        background: transparent;

        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;

        -webkit-font-smoothing: antialiased;

        text-rendering: optimizeLegibility;
      }

      table {
        border-collapse: collapse;
      }

      .wrapper {
        width: 100%;

        background: transparent;

        padding: 40px 20px;
      }

      .card {
        width: 100%;

        max-width: 460px;

        margin: 0 auto;

        background: #0d0d0d;

        border-radius: 24px;

        border: 1px solid rgba(255, 255, 255, 0.06);

        overflow: hidden;

        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.03),
          0 8px 24px rgba(0, 0, 0, 0.35);
      }

      .content {
        padding: 42px 42px;
      }

      h1 {
        margin: 0 0 16px;

        color: #fafafa;

        font-size: 28px;

        font-weight: 600;

        letter-spacing: -1px;

        line-height: 1.1;

        text-align: center;
      }

      p {
        margin: 0;

        color: rgba(255, 255, 255, 0.6);

        font-size: 15px;

        line-height: 1.7;

        text-align: center;
      }

      .button-wrap {
        margin-top: 36px;

        text-align: center;
      }

      .button {
        display: inline-block;

        height: 46px;

        line-height: 46px;

        padding: 0 22px;

        background: #fafafa;

        color: #111111 !important;

        font-size: 14px;

        font-weight: 500;

        text-decoration: none;

        border-radius: 10px;
      }

      .footer {
        margin-top: 32px;

        color: rgba(255, 255, 255, 0.38);

        font-size: 13px;

        line-height: 1.7;

        text-align: center;
      }

      @media only screen and (max-width: 600px) {
        .content {
          padding: 36px 24px;
        }

        h1 {
          font-size: 24px;
        }

        p {
          font-size: 14px;
        }

        .wrapper {
          padding: 24px 14px;
        }
      }
    </style>
  </head>

  <body>
    <table
      role="presentation"
      class="wrapper"
      width="100%"
      cellpadding="0"
      cellspacing="0"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            class="card"
            cellpadding="0"
            cellspacing="0"
          >
            <tr>
              <td class="content">
                <h1>Verify your email</h1>

                <p>
                  Confirm your email address to complete your account setup and
                  continue.
                </p>

                <div class="button-wrap">
                  <a href="{link}" class="button" target="_blank">
                    Verify email
                  </a>
                </div>

                <div class="footer">
                  If you didn’t create an account, you can safely ignore this
                  email.
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
