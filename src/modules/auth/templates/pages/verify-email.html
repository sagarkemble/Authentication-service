<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Email Verification</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #090909;

        --card: #0d0d0d;

        --text: #fafafa;

        --muted: rgba(255, 255, 255, 0.6);

        --success: #22c55e;

        --success-bg: rgba(34, 197, 94, 0.08);

        --error: #ef4444;

        --error-bg: rgba(239, 68, 68, 0.08);

        --shadow:
          0 0 0 1px rgba(255, 255, 255, 0.06), 0 8px 24px rgba(0, 0, 0, 0.35);
      }

      * {
        margin: 0;
        padding: 0;

        box-sizing: border-box;
      }

      body {
        min-height: 100vh;

        display: flex;

        align-items: center;

        justify-content: center;

        padding: 24px;

        background: var(--bg);

        color: var(--text);

        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;

        -webkit-font-smoothing: antialiased;

        text-rendering: optimizeLegibility;
      }

      .card {
        width: 100%;

        max-width: 400px;

        min-height: 320px;

        display: flex;

        align-items: center;

        justify-content: center;

        background: var(--card);

        border-radius: 24px;

        padding: 36px 32px;

        text-align: center;

        box-shadow: var(--shadow);
      }

      #loadingState,
      #successState,
      #errorState {
        width: 100%;
      }

      .icon-wrap {
        width: 64px;

        height: 64px;

        border-radius: 9999px;

        display: flex;

        align-items: center;

        justify-content: center;

        margin: 0 auto 24px;

        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      }

      .icon-wrap.loading {
        background: #111111;
      }

      .icon-wrap.success {
        background: var(--success-bg);
      }

      .icon-wrap.error {
        background: var(--error-bg);
      }

      svg {
        width: 26px;

        height: 26px;
      }

      .spinner {
        width: 26px;

        height: 26px;

        border-radius: 9999px;

        border: 2px solid rgba(255, 255, 255, 0.08);

        border-top-color: #fafafa;

        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      h1 {
        font-size: 26px;

        font-weight: 600;

        letter-spacing: -1px;

        line-height: 1.1;

        margin-bottom: 12px;
      }

      p {
        color: var(--muted);

        font-size: 14px;

        line-height: 1.7;
      }

      .btn {
        width: 100%;

        height: 44px;

        border: none;

        outline: none;

        border-radius: 10px;

        background: #fafafa;

        color: #111111;

        font-size: 14px;

        font-weight: 500;

        cursor: pointer;

        text-decoration: none;

        display: inline-flex;

        align-items: center;

        justify-content: center;

        margin-top: 28px;

        transition:
          opacity 0.15s ease,
          transform 0.15s ease;
      }

      .btn:hover {
        opacity: 0.92;
      }

      .btn:active {
        transform: scale(0.985);
      }

      .hidden {
        display: none;
      }

      @media (max-width: 640px) {
        .card {
          padding: 32px 24px;

          border-radius: 20px;

          min-height: 300px;
        }

        h1 {
          font-size: 22px;

          letter-spacing: -0.8px;
        }

        p {
          font-size: 13px;
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <!-- Loading -->

      <div id="loadingState">
        <div class="icon-wrap loading">
          <div class="spinner"></div>
        </div>

        <h1>Verifying email</h1>

        <p>Please wait while we securely verify your email address.</p>
      </div>

      <!-- Success -->

      <div id="successState" class="hidden">
        <div class="icon-wrap success">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M5 13L9 17L19 7"
              stroke="#22C55E"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>

        <h1>Email verified</h1>

        <p>Your email address has been successfully verified.</p>
      </div>

      <!-- Error -->

      <div id="errorState" class="hidden">
        <div class="icon-wrap error">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M12 8V12M12 16H12.01M22 12C22 17.523 17.523 22 12 22C6.477 22 2 17.523 2 12C2 6.477 6.477 2 12 2C17.523 2 22 6.477 22 12Z"
              stroke="#EF4444"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>

        <h1>Verification failed</h1>

        <p id="errorMessage">
          This verification link is invalid or has expired.
        </p>

        <button class="btn" id="resendBtn" onclick="resendVerificationEmail()">
          Resend Verification
        </button>
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);

      const token = urlParams.get("token");

      const email = urlParams.get("email");

      const loadingState = document.getElementById("loadingState");

      const successState = document.getElementById("successState");

      const errorState = document.getElementById("errorState");

      const errorMessage = document.getElementById("errorMessage");

      function showState(state) {
        loadingState.classList.add("hidden");

        successState.classList.add("hidden");

        errorState.classList.add("hidden");

        if (state === "success") {
          successState.classList.remove("hidden");
        } else if (state === "error") {
          errorState.classList.remove("hidden");
        } else {
          loadingState.classList.remove("hidden");
        }
      }

      async function verifyEmail() {
        if (!token || !email) {
          showState("error");

          errorMessage.textContent =
            "Missing verification token or email address.";

          return;
        }

        try {
          const response = await fetch("/auth/verify-email", {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify({
              token,
              email,
            }),
          });

          const data = await response.json();

          if (response.ok && data.success) {
            showState("success");
          } else {
            showState("error");

            errorMessage.textContent =
              data.message || "This verification link is invalid or expired.";
          }
        } catch (error) {
          console.error(error);

          showState("error");

          errorMessage.textContent =
            "Something went wrong while verifying your email.";
        }
      }
      async function resendVerificationEmail() {
        const resendBtn = document.getElementById("resendBtn");

        resendBtn.disabled = true;

        resendBtn.textContent = "Sending...";

        try {
          const response = await fetch("/auth/resend-verify-email", {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify({
              email,
              token,
            }),
          });

          const data = await response.json();

          if (response.ok && data.success) {
            errorMessage.textContent =
              "A new verification email has been sent.";

            resendBtn.textContent = "Email sent";
          } else {
            errorMessage.textContent =
              data?.message || "Failed to resend verification email.";

            resendBtn.disabled = false;

            resendBtn.textContent = "Resend Verification";
          }
        } catch (error) {
          console.error(error);

          errorMessage.textContent =
            "Something went wrong while resending email.";

          resendBtn.disabled = false;

          resendBtn.textContent = "Resend Verification";
        }
      }

      verifyEmail();
    </script>
  </body>
</html>
