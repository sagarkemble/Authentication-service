<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Reset Password</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #090909;

        --card: #0d0d0d;

        --input: #111111;

        --text: #fafafa;

        --muted: rgba(255, 255, 255, 0.6);

        --placeholder: rgba(255, 255, 255, 0.32);

        --success: #22c55e;

        --success-bg: rgba(34, 197, 94, 0.08);

        --error: #ef4444;

        --error-bg: rgba(239, 68, 68, 0.08);

        --shadow:
          0 0 0 1px rgba(255, 255, 255, 0.06), 0 8px 24px rgba(0, 0, 0, 0.35);

        --focus:
          0 0 0 1px rgba(255, 255, 255, 0.14),
          0 0 0 4px rgba(255, 255, 255, 0.04);
      }

      * {
        margin: 0;

        padding: 0;

        box-sizing: border-box;
      }

      body {
        min-height: 100vh;

        display: flex;

        align-items: center;

        justify-content: center;

        padding: 24px;

        background: var(--bg);

        color: var(--text);

        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;

        -webkit-font-smoothing: antialiased;

        text-rendering: optimizeLegibility;
      }

      .card {
        width: 100%;

        max-width: 440px;

        background: var(--card);

        border-radius: 24px;

        padding: 48px 40px;

        box-shadow: var(--shadow);
      }

      .header {
        text-align: center;

        margin-bottom: 34px;
      }

      .icon-wrap {
        width: 64px;

        height: 64px;

        border-radius: 9999px;

        display: flex;

        align-items: center;

        justify-content: center;

        margin: 0 auto 28px;

        background: #111111;

        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04) inset;

        transition: all 0.25s ease;
      }

      .icon-wrap.success {
        background: var(--success-bg);
      }

      .icon-wrap.error {
        background: var(--error-bg);
      }

      svg {
        width: 26px;

        height: 26px;
      }

      h1 {
        font-size: 24px;

        font-weight: 600;

        letter-spacing: -0.8px;

        line-height: 1.1;

        margin-bottom: 14px;
      }

      p {
        color: var(--muted);

        font-size: 15px;

        line-height: 1.7;
      }

      .field {
        margin-bottom: 18px;
      }

      label {
        display: block;

        font-size: 14px;

        font-weight: 500;

        margin-bottom: 10px;

        color: #f5f5f5;
      }

      .input-wrap {
        position: relative;
      }

      input {
        width: 100%;

        height: 46px;

        border: none;

        outline: none;

        border-radius: 10px;

        background: var(--input);

        color: var(--text);

        padding: 0 44px 0 16px;

        font-size: 14px;

        transition:
          box-shadow 0.2s ease,
          background 0.2s ease;

        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      input::placeholder {
        color: var(--placeholder);
      }

      input:hover {
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.12);
      }

      input:focus {
        box-shadow: var(--focus);
      }

      .toggle-btn {
        position: absolute;

        right: 14px;

        top: 50%;

        transform: translateY(-50%);

        background: none;

        border: none;

        cursor: pointer;

        display: flex;

        align-items: center;

        justify-content: center;

        color: rgba(255, 255, 255, 0.42);
      }

      .toggle-btn svg {
        width: 18px;

        height: 18px;
      }

      .error-msg {
        color: #ef4444;

        font-size: 13px;

        line-height: 1.6;

        margin-top: 4px;

        margin-bottom: 20px;
      }

      .btn {
        width: 100%;

        height: 46px;

        border: none;

        outline: none;

        border-radius: 10px;

        background: #fafafa;

        color: #111111;

        font-size: 14px;

        font-weight: 500;

        cursor: pointer;

        transition:
          opacity 0.15s ease,
          transform 0.15s ease;
      }

      .btn:hover {
        opacity: 0.92;
      }

      .btn:active {
        transform: scale(0.985);
      }

      .btn:disabled {
        opacity: 0.6;

        cursor: not-allowed;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 640px) {
        .card {
          padding: 36px 24px;

          border-radius: 20px;
        }

        h1 {
          font-size: 22px;
        }

        p {
          font-size: 14px;
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <!-- Form State -->

      <div id="formState">
        <div class="header">
          <div class="icon-wrap">
            <svg
              width="28"
              height="28"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M12 2A5 5 0 0 1 17 7V9H7V7A5 5 0 0 1 12 2Z"
                stroke="#FAFAFA"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />

              <rect
                x="4"
                y="9"
                width="16"
                height="12"
                rx="2"
                stroke="#FAFAFA"
                stroke-width="1.8"
              />

              <circle cx="12" cy="15" r="1.5" fill="#FAFAFA" />
            </svg>
          </div>

          <h1>Reset your password</h1>

          <p>Enter a new password for your account.</p>
        </div>

        <form id="resetForm">
          <div class="field">
            <label for="password">New password</label>

            <div class="input-wrap">
              <input
                type="password"
                id="password"
                placeholder="Min. 8 characters"
                required
              />

              <button
                class="toggle-btn"
                type="button"
                onclick="toggleVisibility('password')"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12S5 4 12 4S23 12 23 12S19 20 12 20S1 12 1 12Z" />

                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div class="field">
            <label for="confirm">Confirm password</label>

            <div class="input-wrap">
              <input
                type="password"
                id="confirm"
                placeholder="Repeat your password"
                required
              />

              <button
                class="toggle-btn"
                type="button"
                onclick="toggleVisibility('confirm')"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12S5 4 12 4S23 12 23 12S19 20 12 20S1 12 1 12Z" />

                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div class="error-msg" id="formError"></div>

          <button type="submit" class="btn" id="submitBtn">
            Reset password
          </button>
        </form>
      </div>

      <!-- Success State -->

      <div id="successState" class="hidden">
        <div class="header">
          <div class="icon-wrap success">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M5 13L9 17L19 7"
                stroke="#22C55E"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>

          <h1>Password updated</h1>

          <p>Your password has been successfully reset.</p>
        </div>
      </div>

      <!-- Error State -->

      <div id="errorState" class="hidden">
        <div class="header">
          <div class="icon-wrap error" id="iconWrap">
            <svg
              id="statusIcon"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M12 8V12M12 16H12.01M22 12C22 17.523 17.523 22 12 22C6.477 22 2 17.523 2 12C2 6.477 6.477 2 12 2C17.523 2 22 6.477 22 12Z"
                stroke="#EF4444"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>

          <h1 id="errorTitle">Reset failed</h1>

          <p id="errorMessage">This reset link is invalid or has expired.</p>
        </div>

        <button class="btn" id="resendBtn" onclick="resendForgotPassword()">
          Request new link
        </button>
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);

      const token = urlParams.get("token");

      const email = urlParams.get("email");

      const formState = document.getElementById("formState");

      const successState = document.getElementById("successState");

      const errorState = document.getElementById("errorState");

      const errorMessage = document.getElementById("errorMessage");

      const errorTitle = document.getElementById("errorTitle");

      const formError = document.getElementById("formError");

      const resetForm = document.getElementById("resetForm");

      const submitBtn = document.getElementById("submitBtn");

      function showState(state) {
        formState.classList.add("hidden");

        successState.classList.add("hidden");

        errorState.classList.add("hidden");

        if (state === "form") {
          formState.classList.remove("hidden");
        } else if (state === "success") {
          successState.classList.remove("hidden");
        } else {
          errorState.classList.remove("hidden");
        }
      }

      function toggleVisibility(id) {
        const input = document.getElementById(id);

        input.type = input.type === "password" ? "text" : "password";
      }

      resetForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const password = document.getElementById("password").value;

        const confirm = document.getElementById("confirm").value;

        formError.textContent = "";

        if (!token) {
          formError.textContent = "Missing reset token.";

          return;
        }

        if (password !== confirm) {
          formError.textContent = "Passwords do not match.";

          return;
        }

        submitBtn.disabled = true;

        submitBtn.textContent = "Resetting...";

        try {
          const response = await fetch("/auth/reset-password", {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify({
              token,
              email,
              password,
            }),
          });

          const data = await response.json();

          if (response.ok && data.success) {
            showState("success");
          } else {
            const errorMsg =
              data?.error?.message ||
              data?.message ||
              "Failed to reset password.";

            if (
              errorMsg.toLowerCase().includes("invalid") ||
              errorMsg.toLowerCase().includes("expired")
            ) {
              errorMessage.textContent = errorMsg;

              showState("error");
            } else {
              formError.textContent = errorMsg;

              submitBtn.disabled = false;

              submitBtn.textContent = "Reset password";
            }
          }
        } catch (error) {
          console.error(error);

          formError.textContent = "Something went wrong.";

          submitBtn.disabled = false;

          submitBtn.textContent = "Reset password";
        }
      });

      async function resendForgotPassword() {
        const resendBtn = document.getElementById("resendBtn");

        resendBtn.disabled = true;

        resendBtn.textContent = "Sending...";

        try {
          const response = await fetch("/auth/resend-forgot-password", {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify({
              email,
              token,
            }),
          });

          const data = await response.json();

          if (response.ok && data.success) {
            const iconWrap = document.getElementById("iconWrap");

            const statusIcon = document.getElementById("statusIcon");

            iconWrap.classList.remove("error");

            iconWrap.classList.add("success");

            iconWrap.style.background = "rgba(59, 130, 246, 0.08)";

            statusIcon.innerHTML = `
              <path
                d="M3 8L10.89 13.26C11.5547 13.7031 12.4453 13.7031 13.11 13.26L21 8M5 19H19C20.1046 19 21 18.1046 21 17V7C21 5.89543 20.1046 5 19 5H5C3.89543 5 3 5.89543 3 7V17C3 18.1046 3.89543 19 5 19Z"
                stroke="#3B82F6"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            `;

            errorTitle.textContent = "Reset email sent";

            errorMessage.textContent =
              "A new password reset email has been sent.";

            resendBtn.textContent = "Email sent";

            resendBtn.disabled = true;
          } else {
            const errorMsg =
              data?.error?.message ||
              data?.message ||
              "Failed to resend reset email.";

            errorMessage.textContent = errorMsg;

            const lowerError = errorMsg.toLowerCase();

            if (
              lowerError.includes("user not found") ||
              lowerError.includes("no password reset token found") ||
              lowerError.includes("forgot password flow again") ||
              lowerError.includes("invalid or expired token")
            ) {
              resendBtn.disabled = true;

              if (lowerError.includes("invalid or expired token")) {
                resendBtn.textContent = "Link expired";
              } else if (lowerError.includes("no password reset token found")) {
                resendBtn.textContent = "Request again";
              } else {
                resendBtn.textContent = "Unavailable";
              }
            } else {
              resendBtn.disabled = false;

              resendBtn.textContent = "Request new link";
            }
          }
        } catch (error) {
          console.error(error);

          errorMessage.textContent =
            "Something went wrong while resending email.";

          resendBtn.disabled = false;

          resendBtn.textContent = "Request new link";
        }
      }
    </script>
  </body>
</html>
