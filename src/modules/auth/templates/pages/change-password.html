<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f3;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: #ffffff;
        border: 0.5px solid rgba(0, 0, 0, 0.1);
        border-radius: 16px;
        padding: 3rem 2.5rem;
        text-align: center;
        max-width: 380px;
        width: 90%;
      }

      .icon-wrap {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
      }

      .icon-wrap.form {
        background: #e6f1fb;
      }

      .icon-wrap.success {
        background: #eaf3de;
      }

      .icon-wrap.error {
        background: #fcebeb;
      }

      .icon-wrap svg {
        width: 28px;
        height: 28px;
      }

      h1 {
        font-size: 20px;
        font-weight: 500;
        color: #1a1a1a;
        margin-bottom: 8px;
      }

      p {
        font-size: 15px;
        color: #666;
        line-height: 1.6;
        margin-bottom: 1.75rem;
      }

      .input-wrap {
        margin-bottom: 24px;
        text-align: left;
      }

      .input-wrap label {
        display: block;
        font-size: 13px;
        color: #666;
        margin-bottom: 6px;
      }

      .input-wrap input {
        width: 100%;
        font-size: 15px;
        padding: 10px 40px 10px 14px;
        border: 0.5px solid rgba(0, 0, 0, 0.2);
        border-radius: 8px;
        outline: none;
        background: #fff;
        color: #1a1a1a;
        transition: border-color 0.15s;
      }

      .input-wrap input:focus {
        border-color: rgba(0, 0, 0, 0.4);
      }

      .input-inner {
        position: relative;
      }

      .toggle-btn {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        color: #999;
        display: flex;
        align-items: center;
      }

      .error-msg {
        font-size: 12px;
        color: #a32d2d;
        text-align: left;
        margin-bottom: 22px;
        min-height: 0;
      }

      .btn {
        display: block;
        width: 100%;
        font-size: 14px;
        font-weight: 500;
        color: #1a1a1a;
        background: transparent;
        border: 0.5px solid rgba(0, 0, 0, 0.25);
        border-radius: 8px;
        padding: 11px 24px;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.15s;
        text-align: center;
        border: none;
      }

      .btn:hover {
        background: #f5f5f3;
      }
      .btn:active {
        transform: scale(0.98);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .hidden {
        display: none;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1a18;
        }
        .card {
          background: #242422;
          border-color: rgba(255, 255, 255, 0.1);
        }
        h1 {
          color: #f0f0ee;
        }
        p {
          color: #999;
        }
        .icon-wrap.form {
          background: #0c447c;
        }
        .icon-wrap.success {
          background: #2a3d1e;
        }
        .icon-wrap.error {
          background: #3d1f1f;
        }
        .input-wrap label {
          color: #999;
        }
        .input-wrap input {
          background: #2e2e2c;
          color: #f0f0ee;
          border-color: rgba(255, 255, 255, 0.15);
        }
        .input-wrap input:focus {
          border-color: rgba(255, 255, 255, 0.35);
        }
        .toggle-btn {
          color: #666;
        }
        .btn {
          color: #f0f0ee;
          border-color: rgba(255, 255, 255, 0.2);
        }
        .btn:hover {
          background: #2e2e2c;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- Form State -->
      <div id="formState">
        <div class="icon-wrap form">
          <svg
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M12 2a5 5 0 0 1 5 5v2H7V7a5 5 0 0 1 5-5z"
              stroke="#185FA5"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <rect
              x="4"
              y="9"
              width="16"
              height="12"
              rx="2"
              stroke="#185FA5"
              stroke-width="1.8"
            />
            <circle cx="12" cy="15" r="1.5" fill="#185FA5" />
          </svg>
        </div>

        <h1>Reset your password</h1>
        <p>Enter a new password for your account.</p>

        <form id="resetForm">
          <div class="input-wrap">
            <label for="password">New password</label>
            <div class="input-inner">
              <input
                type="password"
                id="password"
                placeholder="Min. 8 characters"
                required
              />
              <button
                class="toggle-btn"
                type="button"
                onclick="toggleVisibility('password', this)"
                tabindex="-1"
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div class="input-wrap">
            <label for="confirm">Confirm password</label>
            <div class="input-inner">
              <input
                type="password"
                id="confirm"
                placeholder="Repeat your password"
                required
              />
              <button
                class="toggle-btn"
                type="button"
                onclick="toggleVisibility('confirm', this)"
                tabindex="-1"
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div class="error-msg" id="formError"></div>

          <button type="submit" class="btn" id="submitBtn">
            Reset password
          </button>
        </form>
      </div>

      <!-- Success State -->
      <div id="successState" class="hidden">
        <div class="icon-wrap success">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M5 13l4 4L19 7"
              stroke="#3B6D11"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <h1>Password reset successful</h1>
        <p>
          Your password has been successfully reset. You can now log in with
          your new password.
        </p>
        <a href="/login" class="btn">Continue to Login</a>
      </div>

      <!-- Error State -->
      <div id="errorState" class="hidden">
        <div class="icon-wrap error">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M12 8v4m0 4h.01M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2z"
              stroke="#A32D2D"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <h1>Reset failed</h1>
        <p id="errorMessage">Failed to reset password. Please try again.</p>
        <a href="/forgot-password" class="btn">Request new link</a>
      </div>
    </div>

    <script>
      // Get token from URL
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");

      // DOM elements
      const formState = document.getElementById("formState");
      const successState = document.getElementById("successState");
      const errorState = document.getElementById("errorState");
      const errorMessage = document.getElementById("errorMessage");
      const formError = document.getElementById("formError");
      const resetForm = document.getElementById("resetForm");
      const submitBtn = document.getElementById("submitBtn");

      // Function to show state
      function showState(state) {
        formState.classList.add("hidden");
        successState.classList.add("hidden");
        errorState.classList.add("hidden");

        if (state === "form") {
          formState.classList.remove("hidden");
        } else if (state === "success") {
          successState.classList.remove("hidden");
        } else if (state === "error") {
          errorState.classList.remove("hidden");
        }
      }

      // Toggle password visibility
      function toggleVisibility(id, btn) {
        const input = document.getElementById(id);
        const isHidden = input.type === "password";
        input.type = isHidden ? "text" : "password";
        btn.innerHTML = isHidden
          ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12    
  20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
          : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11      
  8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
      }

      // Handle form submission
      resetForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirm").value;

        // Clear previous errors
        formError.textContent = "";

        // Validation
        if (!token) {
          formError.textContent = "No reset token found in URL.";
          return;
        }

        if (!password) {
          formError.textContent = "Please enter a new password.";
          return;
        }

        if (password.length < 8) {
          formError.textContent = "Password must be at least 8 characters.";
          return;
        }

        const strongPassword =
          /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
        if (!strongPassword.test(password)) {
          formError.textContent =
            "Password must contain at least one uppercase letter, one lowercase letter, one number, and one special character.";
          return;
        }

        if (password !== confirm) {
          formError.textContent = "Passwords do not match.";
          return;
        }

        // Disable button
        submitBtn.disabled = true;
        submitBtn.textContent = "Resetting...";

        try {
          const baseUrl = window.location.origin;

          const response = await fetch(`${baseUrl}/auth/change-password`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              token,
              password,
            }),
          });

          const data = await response.json();

          if (response.ok && data.success) {
            showState("success");
          } else {
            formError.textContent =
              data.message || "Failed to reset password. Please try again.";
            submitBtn.disabled = false;
            submitBtn.textContent = "Reset password";
          }
        } catch (error) {
          console.error("Reset password error:", error);
          formError.textContent = "An error occurred. Please try again later.";
          submitBtn.disabled = false;
          submitBtn.textContent = "Reset password";
        }
      });
    </script>
  </body>
</html>
